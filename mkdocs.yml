site_name: VIS Hiroshima
site_url: https://remyuu.github.io/VIS_Hiroshima/
repo_url: https://github.com/Remyuu/VIS_Hiroshima
repo_name: Remyuu/VIS_Hiroshima

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /
          site_name: VIS Hiroshima
          theme:
            language: en
        - locale: zh
          name: 简体中文
          build: true
          site_name: VIS Hiroshima
          theme:
            language: zh
          nav_translations:
            Home: 首页
            Getting Started: 入门
            SSH Keys: SSH 密钥
            Common Linux Commands: 常用 Linux 命令
        - locale: ja
          name: 日本語
          build: true
          site_name: VIS Hiroshima
          theme:
            language: ja
          nav_translations:
            Home: ホーム
            Getting Started: はじめに
            SSH Keys: SSH キー
            Common Linux Commands: よく使う Linux コマンド

nav:
  - Home: index.md
  - Getting Started:
      - SSH Keys: getting-started/ssh-keys.md
      - Common Linux Commands: getting-started/linux-commands.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - assets/stylesheets/extra.css
