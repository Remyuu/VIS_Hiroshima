site_name: VIS Hiroshima
site_url: https://remyuu.github.io/VIS_Hiroshima/
repo_url: https://github.com/Remyuu/VIS_Hiroshima
repo_name: Remyuu/VIS_Hiroshima

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /
          site_name: VIS Hiroshima
          theme:
            language: en
        - locale: zh
          name: 简体中文
          build: true
          site_name: VIS Hiroshima
          theme:
            language: zh
          nav_translations:
            Home: 首页
            Getting Started: 入门
            SSH Keys: SSH 密钥
        - locale: ja
          name: 日本語
          build: true
          site_name: VIS Hiroshima
          theme:
            language: ja
          nav_translations:
            Home: ホーム
            Getting Started: はじめに
            SSH Keys: SSH キー

nav:
  - Home: index.md
  - Getting Started:
      - SSH Keys: getting-started/ssh-keys.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
