site_name: VIS Hiroshima
site_description: Practical computing guide for VIS Hiroshima lab members
site_url: https://remyuu.github.io/VIS_Hiroshima/
repo_url: https://github.com/Remyuu/VIS_Hiroshima
repo_name: Remyuu/VIS_Hiroshima
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /
          site_name: VIS Hiroshima
          theme:
            language: en
        - locale: zh
          name: 简体中文
          build: true
          site_name: VIS Hiroshima
          theme:
            language: zh
          nav_translations:
            Home: 首页
            Before You Connect: 连接前准备
            Local Environment: 配置本机环境
            Connecting to Servers: 连接服务器
            SSH and Server Login: SSH 是什么以及如何连接
            SSH Public and Private Keys: SSH 私钥公钥
            Off-campus Access: 校外访问服务器
            Daily Remote Workflow: 日常远程工作流
            Common Linux Commands: 常用 Linux 命令
            VS Code Remote SSH: VS Code Remote SSH
            File Transfer: 文件传输
            Running Experiments: 运行实验
            tmux and Running Experiments: tmux 和运行实验
            Resource Guidelines: GPU / 硬盘 / 内存使用规范
            Troubleshooting: 常见问题排查
            FAQ: 常见问题
            Analytics: 访问统计
        - locale: ja
          name: 日本語
          build: true
          site_name: VIS Hiroshima
          theme:
            language: ja
          nav_translations:
            Home: ホーム
            Before You Connect: 接続前の準備
            Local Environment: ローカル環境の設定
            Connecting to Servers: サーバーへの接続
            SSH and Server Login: SSH とは何か、接続方法
            SSH Public and Private Keys: SSH 公開鍵と秘密鍵
            Off-campus Access: 学外からのサーバー接続
            Daily Remote Workflow: 日常的なリモート作業
            Common Linux Commands: よく使う Linux コマンド
            VS Code Remote SSH: VS Code Remote SSH
            File Transfer: ファイル転送
            Running Experiments: 実験の実行
            tmux and Running Experiments: tmux と実験の実行
            Resource Guidelines: GPU / ストレージ / メモリ利用規則
            Troubleshooting: トラブルシューティング
            FAQ: FAQ
            Analytics: アクセス解析
  - git-revision-date-localized:
      type: iso_date
      timezone: Asia/Tokyo
  - git-committers:
      enabled: !ENV [CI, false]
      repository: Remyuu/VIS_Hiroshima
      branch: main

nav:
  - Home: index.md
  - Before You Connect:
      - Local Environment: before-you-connect/local-environment.md
  - Connecting to Servers:
      - SSH and Server Login: connecting-to-servers/ssh-keys.md
      - SSH Public and Private Keys: connecting-to-servers/ssh-key-pair.md
      - Off-campus Access: connecting-to-servers/off-campus-access.md
  - Daily Remote Workflow:
      - Common Linux Commands: daily-remote-workflow/linux-commands.md
      - VS Code Remote SSH: daily-remote-workflow/vscode-remote-ssh.md
      - File Transfer: daily-remote-workflow/file-transfer.md
  - Running Experiments:
      - tmux and Running Experiments: running-experiments/tmux-and-experiments.md
      - Resource Guidelines: running-experiments/resource-guidelines.md
  - Troubleshooting:
      - FAQ: troubleshooting/faq.md
  - Analytics: analytics.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/umami.js
  - assets/javascripts/contributors.js
